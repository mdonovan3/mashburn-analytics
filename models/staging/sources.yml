version: 2

sources:

  - name: shopify
    description: "Shopify orders, customers, products, inventory — primary commerce source"
    schema: raw_shopify
    tables:
      - name: orders
        description: "Order headers with nested line_items RECORD ARRAY"
        columns:
          - name: id
            tests: [unique, not_null]
          - name: customer_id
          - name: location_id
          - name: order_number
          - name: email
          - name: source_name
          - name: financial_status
          - name: fulfillment_status
          - name: total_price
          - name: subtotal_price
          - name: total_discounts
          - name: total_tax
          - name: currency
          - name: tags
          - name: discount_codes
          - name: created_at
          - name: updated_at
          - name: line_items
            description: "RECORD ARRAY: id, product_id, variant_id, sku, title, variant_title, quantity, price, total_discount, fulfillment_status"

      - name: customers
        columns:
          - name: id
            tests: [unique, not_null]
          - name: email
          - name: first_name
          - name: last_name
          - name: phone
          - name: created_at
          - name: updated_at
          - name: orders_count
          - name: total_spent
          - name: tags
          - name: accepts_marketing
          - name: default_address
            description: "RECORD: address1, city, province, country, zip"

      - name: products
        columns:
          - name: id
            tests: [unique, not_null]
          - name: title
          - name: product_type
          - name: vendor
          - name: tags
          - name: status
          - name: created_at
          - name: updated_at

      - name: product_variants
        columns:
          - name: id
            tests: [unique, not_null]
          - name: product_id
          - name: sku
          - name: price
          - name: compare_at_price
          - name: inventory_quantity
          - name: option1
          - name: option2
          - name: option3
          - name: created_at

      - name: inventory_levels
        columns:
          - name: inventory_item_id
          - name: location_id
          - name: available
          - name: updated_at

      - name: locations
        columns:
          - name: id
            tests: [unique, not_null]
          - name: name
          - name: city
          - name: province
          - name: country
          - name: zip
          - name: active

  - name: shiphero
    description: "ShipHero WMS — fulfillment, shipments via GraphQL schema"
    schema: raw_shiphero
    tables:
      - name: shipments
        description: "One row per shipment; address and shipping_labels are nested RECORDs"
        columns:
          - name: id
            tests: [unique, not_null]
          - name: order_id
          - name: warehouse_id
          - name: created_date
          - name: delivered
          - name: completed
          - name: picked_up
          - name: needs_refund
          - name: refunded
          - name: address
            description: "RECORD: name, address1, city, state, country, zip, phone"
          - name: shipping_labels
            description: "RECORD ARRAY: id, carrier, shipping_name, shipping_method, tracking_number, tracking_url, cost, status, created_date"

  - name: swym
    description: "Swym — wishlist and back-in-stock waitlist events (actual API field names)"
    schema: raw_swym
    tables:
      - name: wishlist_events
        description: "Add/remove events on customer wishlists — Swym native field names"
        columns:
          - name: _pkey
            tests: [unique, not_null]
          - name: empi
            description: "External merchant product id = Shopify product_id"
          - name: epi
            description: "External product instance id = Shopify variant_id"
          - name: dt
            description: "Product title"
          - name: du
            description: "Product URL"
          - name: iu
            description: "Image URL"
          - name: pr
            description: "Price"
          - name: sku
          - name: lid
            description: "List id"
          - name: di
            description: "Device identifier"
          - name: bt
            description: "Brand/source attribution"
          - name: cts
            description: "Created timestamp (milliseconds)"
          - name: uts
            description: "Updated timestamp (milliseconds)"

      - name: waitlist_signups
        description: "Back-in-stock notification signups by variant"
        columns:
          - name: empi
          - name: epi
          - name: sku
          - name: customer_email
          - name: signed_up_at
          - name: notified_at
          - name: purchased_at

  - name: loop_returns
    description: "Loop Returns — self-serve returns portal (actual Loop API fields)"
    schema: raw_loop
    tables:
      - name: return_requests
        columns:
          - name: id
            tests: [unique, not_null]
          - name: order_name
          - name: provider_order_id
            description: "Shopify order id"
          - name: customer_email
          - name: customer_first_name
          - name: customer_last_name
          - name: state
          - name: type
          - name: carrier
          - name: tracking_number
          - name: total
          - name: refund
          - name: exchange
          - name: gift_card
          - name: currency
          - name: label_status

      - name: return_line_items
        columns:
          - name: id
            tests: [unique, not_null]
          - name: return_request_id
          - name: line_item_id
          - name: product_id
          - name: variant_id
          - name: sku
          - name: title
          - name: variant_title
          - name: price
          - name: reason
          - name: parent_reason
          - name: outcome
            description: "reject, donate, review, keep, default"
          - name: returned_at

  - name: klaviyo
    description: "Klaviyo — email/SMS marketing events and campaigns"
    schema: raw_klaviyo
    tables:
      - name: email_events
        columns:
          - name: id
            tests: [unique, not_null]
          - name: customer_email
          - name: campaign_id
          - name: flow_id
          - name: event_type
            description: "sent, opened, clicked, bounced, unsubscribed"
          - name: subject
          - name: created_at

      - name: campaigns
        columns:
          - name: id
            tests: [unique, not_null]
          - name: name
          - name: subject
          - name: status
          - name: sent_at
          - name: list_id
          - name: open_rate
          - name: click_rate
